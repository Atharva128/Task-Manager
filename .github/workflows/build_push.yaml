name: Build and Publish to registry

on:
    [workflow_dispatch]

jobs:

  build:

    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
        docker build ./frontend -t ${{ secrets.DOCKER_USERNAME }}/task-manager-frontend:latest
        docker build ./backend -t ${{ secrets.DOCKER_USERNAME }}/task-manager-backend:latest
        docker images

    - name: Push to Registry
      run: |
       docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
       docker push ${{ secrets.DOCKER_USERNAME }}/task-manager-frontend:latest
       docker push ${{ secrets.DOCKER_USERNAME }}/task-manager-backend:latest
